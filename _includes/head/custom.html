{% include base_path %}

<!-- start custom head snippets -->

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<!-- Support for Plotly -->
<script src='https://cdnjs.cloudflare.com/ajax/libs/plotly.js/3.0.1/plotly.min.js'></script>

<!-- IndieWeb discovery links -->
{% assign author = site.author %}
{% if author.github %}<link rel="me" href="https://github.com/{{ author.github }}">{% endif %}
{% if author.mastodon %}<link rel="me" href="{{ author.mastodon }}">{% endif %}
{% if author.bluesky %}<link rel="me" href="https://bsky.app/profile/{{ author.bluesky }}">{% endif %}
{% if author.linkedin %}<link rel="me" href="https://www.linkedin.com/in/{{ author.linkedin }}">{% endif %}
{% if author.orcid %}<link rel="me" href="{{ author.orcid }}">{% endif %}
{% if author.email %}<link rel="me" href="mailto:{{ author.email }}">{% endif %}
<link rel="authorization_endpoint" href="https://indieauth.com/auth">
<link rel="token_endpoint" href="https://tokens.indieauth.com/token">
<link rel="webmention" href="https://webmention.io/{{ site.url | replace: 'https://', '' | replace: 'http://', '' }}/webmention">
<link rel="pingback" href="https://webmention.io/xmlrpc">

<!-- end custom head snippets -->
